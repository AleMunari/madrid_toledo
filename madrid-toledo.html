<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#b91c1c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Madrid & Toledo 🇪🇸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root{
      --bg-primary:#fff5f5;--bg-secondary:#fde8e8;--bg-card:#ffffff;--bg-elevated:#fff8f0;
      --border-color:#fca5a5;--accent-primary:#f59e0b;--accent-secondary:#0ea5e9;
      --accent-go:#16a34a;--accent-danger:#dc2626;
      --text-primary:#1c0a0a;--text-secondary:#991b1b;--text-muted:#6b7280;
      --header-bg:#b91c1c;--header-border:#991b1b;
      --shadow-lg:0 8px 32px rgba(185,28,28,0.18);--shadow-card:0 2px 12px rgba(185,28,28,0.10);
      --header-height:7rem;--btn-min:4rem;
      --radius-sm:0.625rem;--radius-md:1rem;--radius-lg:1.5rem;
      --text-xs:1.5rem;--text-sm:1.875rem;--text-base:2.25rem;--text-lg:2.625rem;--text-xl:3rem;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:100%;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',sans-serif;background:var(--bg-primary);background-image:radial-gradient(circle at 15% 30%,rgba(245,158,11,.10) 0%,transparent 50%),radial-gradient(circle at 85% 70%,rgba(185,28,28,.07) 0%,transparent 50%);color:var(--text-primary);font-size:var(--text-base);line-height:1.8;min-height:100vh}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    :focus-visible{outline:3px solid var(--accent-primary);outline-offset:3px;border-radius:var(--radius-sm)}
    .hidden{display:none!important}

    .app-header{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(var(--header-height) + env(safe-area-inset-top,0));padding-top:env(safe-area-inset-top,0);background:var(--header-bg);border-bottom:3px solid var(--header-border);display:flex;align-items:center;justify-content:space-between;padding-left:1rem;padding-right:1rem;gap:.75rem;box-shadow:0 4px 20px rgba(0,0,0,.25)}
    .header-title{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;color:#fff;line-height:1;flex:1;text-align:center}
    .header-flag{font-size:2.2rem}

    .city-tabs{display:flex;background:var(--bg-secondary);border-bottom:3px solid var(--border-color);position:sticky;top:calc(var(--header-height) + env(safe-area-inset-top,0));z-index:150;overflow-x:auto}
    .city-tab{flex:1;min-width:0;padding:.9rem 1.25rem;background:transparent;border:none;font-family:inherit;font-size:var(--text-sm);font-weight:700;color:var(--text-secondary);cursor:pointer;border-bottom:4px solid transparent;transition:all .15s ease;white-space:nowrap}
    .city-tab.active{color:var(--header-bg);border-bottom-color:var(--header-bg);background:var(--bg-card)}
    .city-tab:hover:not(.active){background:var(--bg-secondary)}

    .app-main{padding-top:calc(var(--header-height) + env(safe-area-inset-top,0) + 5rem);padding-bottom:calc(2.5rem + env(safe-area-inset-bottom,0));min-height:100vh}
    .city-section{display:none;padding:1.25rem .75rem;max-width:820px;margin:0 auto}
    .city-section.active{display:block}

    .map-btn-wrap{margin-bottom:1.25rem}
    .btn-open-map{width:100%;min-height:var(--btn-min);background:var(--header-bg);color:#fff;border:none;border-radius:var(--radius-lg);font-family:inherit;font-size:var(--text-base);font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;box-shadow:var(--shadow-lg);transition:all .15s ease}
    .btn-open-map:hover{background:var(--header-border);transform:translateY(-2px)}
    .btn-open-map .pulse{display:inline-block;width:1.1rem;height:1.1rem;background:#fff;border-radius:50%;animation:pulse-anim 1.5s infinite;flex-shrink:0}
    @keyframes pulse-anim{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

    /* MAP MODAL — usa visibility invece di display:none per evitare il bug di Leaflet */
    .map-modal{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:#000;visibility:hidden;pointer-events:none}
    .map-modal.open{visibility:visible;pointer-events:auto}
    .map-modal-header{background:var(--header-bg);color:#fff;display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;flex-shrink:0;min-height:5rem}
    .map-modal-title{font-size:var(--text-lg);font-weight:900;flex:1}
    .map-close-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:var(--radius-sm);padding:.5rem 1rem;font-family:inherit;font-size:var(--text-sm);font-weight:700;cursor:pointer;min-height:3.5rem}
    .map-close-btn:hover{background:rgba(255,255,255,.35)}
    #map-container{flex:1;width:100%;min-height:0}
    .map-status{background:rgba(0,0,0,.78);color:#fff;padding:.5rem 1rem;font-size:var(--text-xs);font-weight:600;text-align:center;flex-shrink:0;line-height:1.4}

    .leaflet-popup-content-wrapper{border-radius:var(--radius-md)!important;font-family:'Outfit',sans-serif!important;font-size:1.5rem!important;box-shadow:0 4px 20px rgba(0,0,0,.25)!important}
    .popup-name{font-weight:900;font-size:1.7rem;color:var(--header-bg);margin-bottom:.25rem}
    .popup-cat{font-size:1.2rem;color:var(--text-muted);margin-bottom:.35rem}
    .popup-price{font-size:1.2rem;color:#374151;margin-bottom:.35rem}
    .popup-dist{font-size:1.4rem;font-weight:700;color:var(--accent-go);margin-bottom:.4rem}
    .popup-go{display:inline-block;background:var(--accent-go);color:#fff;padding:.35rem .9rem;border-radius:.5rem;font-weight:700;font-size:1.3rem;text-decoration:none;margin-top:.2rem}
    .popup-go:hover{background:#15803d}

    .search-box{background:var(--bg-card);border:2.5px solid var(--border-color);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-card);display:flex;gap:.75rem;align-items:center}
    .search-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:var(--text-base);color:var(--text-primary);outline:none}
    .search-input::placeholder{color:#94a3b8}
    .search-icon{font-size:2rem;flex-shrink:0}
    .clear-btn{background:transparent;border:none;cursor:pointer;font-size:1.75rem;color:var(--text-muted);padding:.25rem;border-radius:50%}
    .clear-btn:hover{background:var(--bg-secondary)}

    .filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .filter-btn{padding:.6rem 1.1rem;background:var(--bg-card);border:2px solid var(--border-color);border-radius:2rem;font-family:inherit;font-size:var(--text-xs);font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all .15s ease}
    .filter-btn.active{background:var(--header-bg);border-color:var(--header-bg);color:#fff}
    .filter-btn:hover:not(.active){border-color:var(--header-bg);color:var(--header-bg)}

    .attractions-grid{display:flex;flex-direction:column;gap:1rem}
    .attraction-card{background:var(--bg-card);border:2px solid var(--border-color);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-card);transition:all .15s ease}
    .attraction-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
    .card-header{padding:1.1rem 1.25rem .75rem;display:flex;align-items:flex-start;gap:1rem}
    .card-emoji{font-size:2.75rem;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
    .card-info{flex:1;min-width:0}
    .card-name{font-size:var(--text-lg);font-weight:900;color:var(--text-primary);line-height:1.2;margin-bottom:.25rem}
    .card-category{display:inline-block;padding:.2rem .75rem;background:var(--bg-secondary);border-radius:2rem;font-size:1.3rem;font-weight:700;color:var(--text-secondary);margin-bottom:.5rem}
    .card-desc{font-size:var(--text-sm);color:#4b5563;line-height:1.6}
    .card-meta{padding:.625rem 1.25rem;display:flex;flex-wrap:wrap;gap:.5rem;background:var(--bg-elevated);border-top:1px solid var(--border-color)}
    .meta-badge{display:flex;align-items:center;gap:.35rem;background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:var(--radius-sm);padding:.3rem .75rem;font-size:1.3rem;font-weight:600;color:var(--text-primary)}
    .card-actions{padding:.875rem 1.25rem;display:grid;grid-template-columns:1fr 1fr;gap:.625rem;border-top:1px solid var(--border-color)}
    .btn-nav{background:var(--accent-go);color:#fff;border:none;border-radius:var(--radius-md);padding:.875rem 1rem;font-family:inherit;font-size:var(--text-sm);font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--btn-min);transition:all .15s ease;grid-column:1/-1}
    .btn-nav:hover{background:#15803d;transform:translateY(-1px)}
    .btn-map-pin{background:var(--accent-secondary);color:#fff;border:none;border-radius:var(--radius-md);padding:.875rem 1rem;font-family:inherit;font-size:var(--text-sm);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--btn-min);transition:all .15s ease}
    .btn-map-pin:hover{background:#0284c7;transform:translateY(-1px)}
    .btn-info{background:var(--header-bg);color:#fff;border:none;border-radius:var(--radius-md);padding:.875rem 1rem;font-family:inherit;font-size:var(--text-sm);font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--btn-min);transition:all .15s ease}
    .btn-info:hover{background:var(--header-border);transform:translateY(-1px)}

    .section-heading{font-size:var(--text-xl);font-weight:900;color:var(--header-bg);margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;padding-bottom:.75rem;border-bottom:3px solid var(--border-color)}
    .count-badge{background:var(--header-bg);color:#fff;border-radius:2rem;padding:.2rem .9rem;font-size:1.4rem;font-weight:700}
    .no-results{text-align:center;padding:3rem 1rem;color:#94a3b8;font-size:var(--text-base)}
    .no-results-icon{font-size:4rem;display:block;margin-bottom:1rem}

    #toast-container{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
    .toast{background:#1e293b;color:#fff;padding:1rem 1.75rem;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.3);opacity:0;transform:translateY(1rem);transition:all .25s ease;pointer-events:auto;white-space:nowrap;max-width:90vw}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{border-left:4px solid var(--accent-go)}
    .toast.info{border-left:4px solid var(--accent-secondary)}
    .toast.error{border-left:4px solid var(--accent-danger)}
  </style>
</head>
<body>

<header class="app-header" role="banner">
  <span class="header-flag" aria-hidden="true">🇪🇸</span>
  <h1 class="header-title">Madrid & Toledo</h1>
  <span class="header-flag" aria-hidden="true">🏰</span>
</header>

<nav class="city-tabs" role="tablist" aria-label="Seleziona città">
  <button class="city-tab active" role="tab" aria-selected="true" id="tab-madrid" onclick="switchCity('madrid')">🏙 Madrid</button>
  <button class="city-tab" role="tab" aria-selected="false" id="tab-toledo" onclick="switchCity('toledo')">⚔️ Toledo</button>
</nav>

<main class="app-main">

  <section id="section-madrid" class="city-section active">
    <h2 class="section-heading">🏙 Madrid <span class="count-badge" id="count-madrid">0</span></h2>
    <div class="map-btn-wrap">
      <button class="btn-open-map" onclick="openMap('madrid')">
        <span class="pulse" aria-hidden="true"></span>
        📍 Mappa — Dove sono e attrazioni vicine
      </button>
    </div>
    <div class="search-box">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="text" class="search-input" id="search-madrid" placeholder="Cerca attrazione, ristorante, stazione..." oninput="renderGrid('madrid')" autocomplete="off"/>
      <button class="clear-btn" onclick="clearSearch('madrid')">✕</button>
    </div>
    <div class="filter-bar" id="filters-madrid"></div>
    <div class="attractions-grid" id="grid-madrid" aria-live="polite"></div>
  </section>

  <section id="section-toledo" class="city-section">
    <h2 class="section-heading">⚔️ Toledo <span class="count-badge" id="count-toledo">0</span></h2>
    <div class="map-btn-wrap">
      <button class="btn-open-map" onclick="openMap('toledo')">
        <span class="pulse" aria-hidden="true"></span>
        📍 Mappa — Dove sono e attrazioni vicine
      </button>
    </div>
    <div class="search-box">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="text" class="search-input" id="search-toledo" placeholder="Cerca attrazione, ristorante, stazione..." oninput="renderGrid('toledo')" autocomplete="off"/>
      <button class="clear-btn" onclick="clearSearch('toledo')">✕</button>
    </div>
    <div class="filter-bar" id="filters-toledo"></div>
    <div class="attractions-grid" id="grid-toledo" aria-live="polite"></div>
  </section>

</main>

<!-- MAP MODAL — usa classe .open invece di .hidden per non smontare il DOM -->
<div id="map-modal" class="map-modal" role="dialog" aria-modal="true">
  <div class="map-modal-header">
    <span aria-hidden="true">🗺</span>
    <span class="map-modal-title" id="map-modal-title">Mappa</span>
    <button class="map-close-btn" onclick="closeMap()">✕ Chiudi</button>
  </div>
  <div class="map-status" id="map-status">In attesa…</div>
  <div id="map-container"></div>
</div>

<div id="toast-container" aria-live="polite"></div>
<div id="sr-announce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

<script>
'use strict';

// ============================================================
//  DATI — coordinate reali verificate
// ============================================================

// ============================================================
//  STATO
// ============================================================
let activeCity = 'madrid';
let activeFilters = { madrid:'Tutti', toledo:'Tutti' };
let userPosition = null;
let mapInstance = null;
let mapCurrentCity = null;
let userMarker = null;
let attractionMarkers = [];

// ============================================================
//  INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  ['madrid','toledo'].forEach(c => { buildFilters(c); renderGrid(c); });
  // Pre-crea la mappa (invisibile) così Leaflet esiste già per Toledo
  initLeaflet('madrid');
});

// ============================================================
//  SWITCH CITY
// ============================================================
function switchCity(city) {
  activeCity = city;
  document.querySelectorAll('.city-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.city-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
  document.getElementById('section-'+city).classList.add('active');
  const tab = document.getElementById('tab-'+city);
  tab.classList.add('active');
  tab.setAttribute('aria-selected','true');
}

// ============================================================
//  FILTRI
// ============================================================
function buildFilters(city) {
  const categories = ['Tutti', ...new Set(ATTRACTIONS[city].map(a => a.category))];
  const container = document.getElementById('filters-'+city);
  container.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat==='Tutti' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeFilters[city] = cat;
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(city);
    });
    container.appendChild(btn);
  });
}

function clearSearch(city) {
  document.getElementById('search-'+city).value = '';
  renderGrid(city);
}

function renderGrid(city) {
  const query = (document.getElementById('search-'+city)?.value||'').toLowerCase().trim();
  const catFilter = activeFilters[city]||'Tutti';
  let items = ATTRACTIONS[city];
  if (catFilter !== 'Tutti') items = items.filter(a => a.category===catFilter);
  if (query) items = items.filter(a =>
    a.name.toLowerCase().includes(query) ||
    a.desc.toLowerCase().includes(query) ||
    a.category.toLowerCase().includes(query)
  );
  if (userPosition) {
    items = items.map(a => ({ ...a, dist: haversine(userPosition.lat, userPosition.lng, a.lat, a.lng) }));
    items.sort((a,b) => a.dist - b.dist);
  }
  const grid = document.getElementById('grid-'+city);
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = '<div class="no-results"><span class="no-results-icon">🔍</span><p>Nessun risultato trovato.</p></div>';
  } else {
    items.forEach(a => grid.appendChild(buildCard(a)));
  }
  const badge = document.getElementById('count-'+city);
  if (badge) badge.textContent = items.length;
}

// ============================================================
//  BUILD CARD
// ============================================================
function buildCard(a) {
  const card = document.createElement('article');
  card.className = 'attraction-card';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${a.lat},${a.lng}&travelmode=walking`;
  const infoUrl = `https://www.google.com/search?q=${encodeURIComponent(a.name+' Toledo')}`;
  const distBadge = (a.dist !== undefined)
    ? `<div class="meta-badge"><span>🚶</span> ${formatDist(a.dist)} · ≈${walkMin(a.dist)} min</div>` : '';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-emoji" aria-hidden="true">${a.emoji}</span>
      <div class="card-info">
        <h3 class="card-name">${esc(a.name)}</h3>
        <span class="card-category">${esc(a.category)}</span>
        <p class="card-desc">${esc(a.desc)}</p>
      </div>
    </div>
    <div class="card-meta">
      <div class="meta-badge"><span>🕐</span> ${esc(a.orario)}</div>
      <div class="meta-badge"><span>💶</span> ${esc(a.prezzo)}</div>
      ${a.tempo && a.tempo!=='–' ? `<div class="meta-badge"><span>⏱</span> ${esc(a.tempo)}</div>` : ''}
      ${distBadge}
    </div>
    <div class="card-actions">
      <button class="btn-map-pin" onclick="openMapOnPlace('${a.id}')">📍 Vedi su Mappa</button>
      <a class="btn-info" href="${infoUrl}" target="_blank" rel="noopener noreferrer">ℹ️ Info</a>
      <a class="btn-nav" href="${navUrl}" target="_blank" rel="noopener noreferrer">🧭 Portami Lì — Navigazione a Piedi</a>
    </div>`;
  return card;
}

// ============================================================
//  MAPPA — il trucco: usa visibility/pointer-events, NON display:none
//          così Leaflet non perde le dimensioni del container
// ============================================================
function initLeaflet(city) {
  if (mapInstance) return; // già inizializzata
  const center = city==='madrid' ? [40.4168,-3.7038] : [39.8581,-4.0244];
  mapInstance = L.map('map-container', { zoomControl:true }).setView(center, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(mapInstance);
  mapCurrentCity = city;
}

function openMap(city) {
  document.getElementById('map-modal-title').textContent = city==='madrid' ? '🏙 Mappa Madrid' : '⚔️ Mappa Toledo';
  document.getElementById('map-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  setMapStatus('📡 Rilevamento posizione GPS…');

  // Serve un piccolo ritardo per far sì che il container sia visibile prima di tutto
  setTimeout(() => {
    // Se cambia città, reinizializza
    if (!mapInstance || mapCurrentCity !== city) {
      if (mapInstance) { mapInstance.remove(); mapInstance = null; attractionMarkers = []; }
      const center = city==='madrid' ? [40.4168,-3.7038] : [39.8581,-4.0244];
      mapInstance = L.map('map-container', { zoomControl:true }).setView(center, 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:'© OpenStreetMap contributors', maxZoom:19
      }).addTo(mapInstance);
      mapCurrentCity = city;
    }

    // Fondamentale: invalidare la size dopo che il modal è visibile
    mapInstance.invalidateSize();

    // Piazza marker attrazioni
    attractionMarkers.forEach(m => mapInstance.removeLayer(m));
    attractionMarkers = [];
    ATTRACTIONS[city].forEach(a => {
      const icon = L.divIcon({
        html:`<div style="font-size:1.9rem;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.45))">${a.emoji}</div>`,
        className:'', iconSize:[32,32], iconAnchor:[16,16]
      });
      const m = L.marker([a.lat, a.lng], { icon });
      m._attractionId = a.id;
      m.bindPopup(() => buildPopupContent(a), { maxWidth:290, minWidth:220 });
      m.addTo(mapInstance);
      attractionMarkers.push(m);
    });

    // Geolocalizzazione
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          if (userMarker) { userMarker.remove(); userMarker = null; }
          const pulseIcon = L.divIcon({
            html:`<div style="width:20px;height:20px;background:#2563eb;border:4px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(37,99,235,.3),0 2px 8px rgba(0,0,0,.3)"></div>`,
            className:'', iconSize:[20,20], iconAnchor:[10,10]
          });
          userMarker = L.marker([userPosition.lat, userPosition.lng], { icon: pulseIcon, zIndexOffset:1000 });
          userMarker.bindPopup('<b style="font-size:1.4rem">📍 Sei qui</b>');
          userMarker.addTo(mapInstance);
          mapInstance.setView([userPosition.lat, userPosition.lng], 16);
          updateAllDistances(city);
          renderGrid(city);
          setMapStatus('✅ Posizione trovata — tocca un segnaposto per distanza e navigazione');
        },
        _err => {
          setMapStatus('⚠️ GPS non disponibile — mappa senza posizione. Attiva il GPS e riprova.');
        },
        { timeout:12000, enableHighAccuracy:true }
      );
    } else {
      setMapStatus('⚠️ GPS non supportato da questo browser');
    }
  }, 120);
}

function buildPopupContent(a) {
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${a.lat},${a.lng}&travelmode=walking`;
  const dist = userPosition ? haversine(userPosition.lat, userPosition.lng, a.lat, a.lng) : null;
  const distHtml = dist !== null
    ? `<div class="popup-dist">🚶 ${formatDist(dist)} · ≈${walkMin(dist)} min a piedi</div>`
    : '';
  return `<div>
    <div class="popup-name">${esc(a.name)}</div>
    <div class="popup-cat">${esc(a.category)}</div>
    <div class="popup-price">💶 ${esc(a.prezzo)}</div>
    ${distHtml}
    <a class="popup-go" href="${navUrl}" target="_blank" rel="noopener noreferrer">🧭 Portami Lì</a>
  </div>`;
}

function openMapOnPlace(id) {
  const city = ATTRACTIONS.madrid.find(a=>a.id===id) ? 'madrid' : 'toledo';
  openMap(city);
  setTimeout(() => {
    const a = ATTRACTIONS[city].find(x => x.id===id);
    if (!a || !mapInstance) return;
    mapInstance.setView([a.lat, a.lng], 17);
    const marker = attractionMarkers.find(m => m._attractionId===id);
    if (marker) marker.openPopup();
  }, 500);
}

function closeMap() {
  document.getElementById('map-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function setMapStatus(msg) {
  const el = document.getElementById('map-status');
  if (el) el.textContent = msg;
}

function updateAllDistances(city) {
  if (!userPosition) return;
  ATTRACTIONS[city].forEach(a => {
    a.dist = haversine(userPosition.lat, userPosition.lng, a.lat, a.lng);
  });
}

// ============================================================
//  UTILS DISTANZA
// ============================================================
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000, dL=(lat2-lat1)*Math.PI/180, dN=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDist(m){ return m<1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km'; }
function walkMin(m){ return Math.ceil(m/80); }

// ============================================================
//  UTILS
// ============================================================
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function showToast(msg,type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg; c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2800);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeMap(); });
</script>
