<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#b91c1c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Madrid & Toledo 🇪🇸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    :root{
      --bg:#fff5f5;--bg2:#fde8e8;--card:#fff;--elev:#fff8f0;
      --bord:#fca5a5;--sky:#0ea5e9;--go:#16a34a;--red:#dc2626;
      --tx:#1c0a0a;--tx2:#991b1b;--muted:#6b7280;
      --hbg:#b91c1c;--hbord:#991b1b;
      --shad:0 8px 32px rgba(185,28,28,.18);--shadc:0 2px 12px rgba(185,28,28,.10);
      --hh:7rem;--bmin:4rem;
      --rs:.625rem;--rm:1rem;--rl:1.5rem;
      --xs:1.5rem;--sm:1.875rem;--base:2.25rem;--lg:2.625rem;--xl:3rem;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:100%;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{font-family:'Outfit',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 15% 30%,rgba(245,158,11,.10) 0%,transparent 50%),radial-gradient(circle at 85% 70%,rgba(185,28,28,.07) 0%,transparent 50%);color:var(--tx);font-size:var(--base);line-height:1.8;min-height:100vh}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    :focus-visible{outline:3px solid #f59e0b;outline-offset:3px;border-radius:var(--rs)}

    .app-header{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(var(--hh) + env(safe-area-inset-top,0));padding-top:env(safe-area-inset-top,0);background:var(--hbg);border-bottom:3px solid var(--hbord);display:flex;align-items:center;justify-content:space-between;padding-left:1rem;padding-right:1rem;gap:.75rem;box-shadow:0 4px 20px rgba(0,0,0,.25)}
    .htitle{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;color:#fff;flex:1;text-align:center}
    .hflag{font-size:2.2rem}

    .city-tabs{display:flex;background:var(--bg2);border-bottom:3px solid var(--bord);position:sticky;top:calc(var(--hh) + env(safe-area-inset-top,0));z-index:150;overflow-x:auto}
    .city-tab{flex:1;padding:.9rem 1.25rem;background:transparent;border:none;font-family:inherit;font-size:var(--sm);font-weight:700;color:var(--tx2);cursor:pointer;border-bottom:4px solid transparent;transition:all .15s;white-space:nowrap}
    .city-tab.active{color:var(--hbg);border-bottom-color:var(--hbg);background:var(--card)}
    .city-tab:hover:not(.active){background:var(--bg2)}

    .app-main{padding-top:calc(var(--hh) + env(safe-area-inset-top,0) + 5rem);padding-bottom:calc(2.5rem + env(safe-area-inset-bottom,0));min-height:100vh}
    .city-section{display:none;padding:1.25rem .75rem;max-width:820px;margin:0 auto}
    .city-section.active{display:block}

    /* ── PULSANTE MAPPA ── */
    .btn-open-map{width:100%;min-height:var(--bmin);background:var(--hbg);color:#fff;border:none;border-radius:var(--rl);font-family:inherit;font-size:var(--base);font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;box-shadow:var(--shad);transition:all .15s;margin-bottom:1.25rem}
    .btn-open-map:hover{background:var(--hbord);transform:translateY(-2px)}
    .pulse{display:inline-block;width:1.1rem;height:1.1rem;background:#fff;border-radius:50%;animation:pa 1.5s infinite;flex-shrink:0}
    @keyframes pa{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

    /* ── MAP MODAL — visibility trick (non display:none) ── */
    .map-modal{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:#000;visibility:hidden;pointer-events:none;overflow:hidden}
    .map-modal.open{visibility:visible;pointer-events:auto}
    .map-head{background:var(--hbg);color:#fff;display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;flex-shrink:0;min-height:5rem}
    .map-title{font-size:var(--lg);font-weight:900;flex:1}
    .map-close{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:var(--rs);padding:.5rem 1rem;font-family:inherit;font-size:var(--sm);font-weight:700;cursor:pointer;min-height:3.5rem}
    .map-close:hover{background:rgba(255,255,255,.35)}
    .map-status{background:rgba(0,0,0,.82);color:#fff;padding:.6rem 1rem;font-size:var(--xs);font-weight:600;text-align:center;flex-shrink:0;line-height:1.5;order:3}
    #map-container{flex:1;width:100%;min-height:0;height:0;order:2}

    .leaflet-popup-content-wrapper{border-radius:10px!important;font-family:'Outfit',sans-serif!important;font-size:14px!important;box-shadow:0 4px 20px rgba(0,0,0,.25)!important;max-width:220px!important}
    .leaflet-popup-content{margin:10px 12px!important}
    .pname{font-weight:900;font-size:15px;color:var(--hbg);margin-bottom:2px;line-height:1.3}
    .pcat{font-size:12px;color:var(--muted);margin-bottom:2px}
    .pprice{font-size:12px;color:#374151;margin-bottom:3px}
    .pdist{font-size:13px;font-weight:700;color:var(--go);margin-bottom:4px}
    .pgo{display:inline-block;background:var(--go);color:#fff;padding:5px 12px;border-radius:6px;font-weight:700;font-size:13px;text-decoration:none;margin-top:3px}
    .pgo:hover{background:#15803d}

    .search-box{background:var(--card);border:2.5px solid var(--bord);border-radius:var(--rl);padding:.75rem 1rem;margin-bottom:1.25rem;box-shadow:var(--shadc);display:flex;gap:.5rem;align-items:center;position:relative}
    .search-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:var(--base);color:var(--tx);outline:none;text-align:left;min-width:0;padding-right:.25rem}
    .search-input::placeholder{color:#94a3b8}
    .clear-btn{background:var(--bg2);border:none;cursor:pointer;font-size:1.5rem;color:var(--muted);padding:.3rem .6rem;border-radius:.75rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;min-width:2.5rem;min-height:2.5rem;transition:background .15s}
    .clear-btn:hover{background:var(--bord)}

    .filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .filter-btn{padding:.55rem 1rem;background:var(--card);border:2px solid var(--bord);border-radius:2rem;font-family:inherit;font-size:var(--xs);font-weight:700;color:var(--tx2);cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--hbg);border-color:var(--hbg);color:#fff}
    .filter-btn:hover:not(.active){border-color:var(--hbg);color:var(--hbg)}

    .grid{display:flex;flex-direction:column;gap:1rem}
    .card{background:var(--card);border:2px solid var(--bord);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadc);transition:all .15s}
    .card:hover{box-shadow:var(--shad);transform:translateY(-2px)}
    .card-head{padding:1.1rem 1.25rem .75rem;display:flex;align-items:flex-start;gap:1rem}
    .cemoji{font-size:2.75rem;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
    .cinfo{flex:1;min-width:0}
    .cname{font-size:var(--lg);font-weight:900;color:var(--tx);line-height:1.2;margin-bottom:.25rem}
    .ccat{display:inline-block;padding:.2rem .75rem;background:var(--bg2);border-radius:2rem;font-size:1.3rem;font-weight:700;color:var(--tx2);margin-bottom:.5rem}
    .cdesc{font-size:var(--sm);color:#4b5563;line-height:1.6}
    .card-meta{padding:.625rem 1.25rem;display:flex;flex-wrap:wrap;gap:.5rem;background:var(--elev);border-top:1px solid var(--bord)}
    .badge{display:flex;align-items:center;gap:.35rem;background:var(--card);border:1.5px solid var(--bord);border-radius:var(--rs);padding:.3rem .75rem;font-size:1.3rem;font-weight:600;color:var(--tx)}
    .card-act{padding:.875rem 1.25rem;display:grid;grid-template-columns:1fr 1fr;gap:.625rem;border-top:1px solid var(--bord)}
    .btn-map{background:var(--sky);color:#fff;border:none;border-radius:var(--rm);padding:.875rem 1rem;font-family:inherit;font-size:var(--sm);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--bmin);transition:all .15s}
    .btn-map:hover{background:#0284c7;transform:translateY(-1px)}
    .btn-info{background:var(--hbg);color:#fff;border:none;border-radius:var(--rm);padding:.875rem 1rem;font-family:inherit;font-size:var(--sm);font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--bmin);transition:all .15s}
    .btn-info:hover{background:var(--hbord);transform:translateY(-1px)}
    .btn-nav{background:var(--go);color:#fff;border:none;border-radius:var(--rm);padding:.875rem 1rem;font-family:inherit;font-size:var(--sm);font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:var(--bmin);transition:all .15s;grid-column:1/-1}
    .btn-nav:hover{background:#15803d;transform:translateY(-1px)}

    .sec-head{font-size:var(--xl);font-weight:900;color:var(--hbg);margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem;padding-bottom:.75rem;border-bottom:3px solid var(--bord)}
    .cbadge{background:var(--hbg);color:#fff;border-radius:2rem;padding:.2rem .9rem;font-size:1.4rem;font-weight:700}
    .nores{text-align:center;padding:3rem 1rem;color:#94a3b8;font-size:var(--base)}
    .nores-icon{font-size:4rem;display:block;margin-bottom:1rem}

    #tc{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
    .toast{background:#1e293b;color:#fff;padding:1rem 1.75rem;border-radius:var(--rm);font-size:var(--sm);font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.3);opacity:0;transform:translateY(1rem);transition:all .25s;pointer-events:auto;white-space:nowrap;max-width:90vw}
    .toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<header class="app-header">
  <span class="hflag">🇪🇸</span>
  <h1 class="htitle">Madrid & Toledo</h1>
  <span class="hflag">🏰</span>
</header>

<nav class="city-tabs" role="tablist">
  <button class="city-tab active" role="tab" aria-selected="true" id="tab-madrid" onclick="switchCity('madrid')">🏙️ Madrid</button>
  <button class="city-tab" role="tab" aria-selected="false" id="tab-toledo" onclick="switchCity('toledo')">⚔️ Toledo</button>
</nav>

<main class="app-main">
  <section id="section-madrid" class="city-section active">
    <h2 class="sec-head">🏙️ Madrid <span class="cbadge" id="count-madrid">0</span></h2>
    <button class="btn-open-map" onclick="openMap('madrid')">
      <span class="pulse"></span>🗺️ Apri Mappa con la mia Posizione
    </button>
    <div class="search-box">
      <span style="font-size:2rem">🔍</span>
      <input type="text" class="search-input" id="search-madrid" placeholder="Cerca..." oninput="renderGrid('madrid')" autocomplete="off"/>
      <button class="clear-btn" onclick="clearSearch('madrid')" title="Cancella ricerca">✕ Cancella</button>
    </div>
    <div class="filter-bar" id="filters-madrid"></div>
    <div class="grid" id="grid-madrid" aria-live="polite"></div>
  </section>

  <section id="section-toledo" class="city-section">
    <h2 class="sec-head">⚔️ Toledo <span class="cbadge" id="count-toledo">0</span></h2>
    <button class="btn-open-map" onclick="openMap('toledo')">
      <span class="pulse"></span>🗺️ Apri Mappa con la mia Posizione
    </button>
    <div class="search-box">
      <span style="font-size:2rem">🔍</span>
      <input type="text" class="search-input" id="search-toledo" placeholder="Cerca..." oninput="renderGrid('toledo')" autocomplete="off"/>
      <button class="clear-btn" onclick="clearSearch('toledo')" title="Cancella ricerca">✕ Cancella</button>
    </div>
    <div class="filter-bar" id="filters-toledo"></div>
    <div class="grid" id="grid-toledo" aria-live="polite"></div>
  </section>
</main>

<div id="map-modal" class="map-modal" role="dialog" aria-modal="true">
  <div class="map-head">
    <span>🗺️</span>
    <span class="map-title" id="map-title">Mappa</span>
    <button class="map-close" onclick="closeMap()">✕ Chiudi</button>
  </div>
  <div class="map-status" id="map-status">In attesa…</div>
  <div id="map-container"></div>
</div>

<div id="tc" aria-live="polite"></div>
<div class="sr-only" id="announce" aria-live="assertive" aria-atomic="true"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  DATI — fonti: esmadrid.com, turismo.toledo.es, spain.info,
//          toledoguiaturisticaycultural.com, visitmadrid.es
// ═══════════════════════════════════════════════════════════════
const DATA = {
  madrid: [

    // ── STAZIONI ────────────────────────────────────────────
    {id:'ms1',name:'Stazione di Atocha',emoji:'🚉',cat:'Stazione',
      desc:'Principale stazione ferroviaria di Madrid. Treni AVE per Toledo (33 min), Barcellona, Siviglia. All\'interno ospita uno spettacolare giardino tropicale con tartarughe e pesci. Punto di partenza ideale del viaggio.',
      orario:'5:30–23:30',prezzo:'Gratuito (biglietti treno a parte)',tempo:'–',lat:40.4065,lng:-3.6892},
    {id:'ms2',name:'Stazione di Chamartín',emoji:'🚉',cat:'Stazione',
      desc:'Grande stazione del nord di Madrid con treni per il nord della Spagna, Francia e Portogallo. Hub dei Cercanías suburbani. Si raggiunge con Metro linea 10.',
      orario:'Sempre aperta',prezzo:'Gratuito',tempo:'–',lat:40.4727,lng:-3.6827},
    {id:'ms3',name:'Metro Puerta del Sol',emoji:'🚇',cat:'Stazione',
      desc:'La stazione metro più centrale di Madrid (linee 1, 2, 3). Accesso diretto alla Puerta del Sol, cuore e chilometro zero della Spagna.',
      orario:'6:00–1:30 (ven–sab 6:00–2:00)',prezzo:'€1.50–2.00',tempo:'–',lat:40.4168,lng:-3.7038},
    {id:'ms4',name:'Metro Gran Vía',emoji:'🚇',cat:'Stazione',
      desc:'Metro sulla celebre Gran Vía, linea 5. Accesso ideale per teatri, cinema e shopping nel boulevard più famoso di Madrid.',
      orario:'6:00–1:30',prezzo:'€1.50–2.00',tempo:'–',lat:40.4202,lng:-3.7054},
    {id:'ms5',name:'Metro Nuevos Ministerios',emoji:'🚇',cat:'Stazione',
      desc:'Hub metro (linee 6, 8, 10). Collegamento diretto all\'Aeroporto Adolfo Suárez Barajas con Metro Expreso Línea 8 in soli 12 minuti.',
      orario:'6:00–1:30',prezzo:'€1.50 + supplemento aeroporto',tempo:'–',lat:40.4455,lng:-3.6925},
    {id:'ms6',name:'Metro Banco de España',emoji:'🚇',cat:'Stazione',
      desc:'Metro linea 2. A 2 minuti dalla Fontana di Cibeles e dal Paseo del Prado. Punto di accesso ideale per il Triangolo dell\'Arte (Prado, Thyssen, Reina Sofía).',
      orario:'6:00–1:30',prezzo:'€1.50–2.00',tempo:'–',lat:40.4191,lng:-3.6945},
    {id:'ms7',name:'Metro Opera',emoji:'🚇',cat:'Stazione',
      desc:'Metro linee 2 e 5. A pochi passi dal Palazzo Reale, dal Teatro Real e dalla Plaza de Oriente. Zona più elegante e storica di Madrid.',
      orario:'6:00–1:30',prezzo:'€1.50–2.00',tempo:'–',lat:40.4185,lng:-3.7118},

    // ── MUSEI ───────────────────────────────────────────────
    {id:'m1',name:'Museo del Prado',emoji:'🖼️',cat:'Museo',
      desc:'Uno dei più grandi musei d\'arte al mondo (fonte: esmadrid.com). Capolavori di Velázquez ("Las Meninas"), Goya ("Tres de Mayo"), Rubens, Tiziano, Bosch ("Il Giardino delle Delizie"). 8.000 opere.',
      orario:'Lun–Sab 10–20, Dom 10–19',prezzo:'€15 (gratis lun–sab 18–20)',tempo:'2–3 ore',lat:40.4138,lng:-3.6921},
    {id:'m2',name:'Museo Reina Sofía',emoji:'🎨',cat:'Museo',
      desc:'Arte contemporanea spagnola: il "Guernica" di Picasso, sculture di Calder, Dalí e Miró. Edificio storico ampliato da Jean Nouvel. Fonte: esmadrid.com.',
      orario:'Lun, Mer–Sab 10–21, Dom 10–14:30',prezzo:'€12 (gratis sab 19+)',tempo:'2–3 ore',lat:40.4085,lng:-3.6943},
    {id:'m3',name:'Museo Thyssen-Bornemisza',emoji:'🏛️',cat:'Museo',
      desc:'Il terzo vertice del "Triangolo dell\'Arte". Dall\'arte medievale all\'Impressionismo: Van Eyck, Caravaggio, Monet, Renoir, Hopper. Una delle più ricche collezioni private al mondo.',
      orario:'Mar–Dom 10–19 (sab 10–21)',prezzo:'€13',tempo:'2 ore',lat:40.4153,lng:-3.6941},
    {id:'m4',name:'Museo Arqueológico Nacional',emoji:'🏺',cat:'Museo',
      desc:'La Dama de Elche e la Dama de Baza, reperti iberici, romani, visigoti e arabi. La storia della Penisola Iberica dalla preistoria al Rinascimento.',
      orario:'Mar–Sab 9:30–20, Dom 9:30–15',prezzo:'€3',tempo:'1.5 ore',lat:40.4226,lng:-3.6889},
    {id:'m5',name:'Museo Sorolla',emoji:'☀️',cat:'Museo',
      desc:'Casa-museo del pittore valenciano Joaquín Sorolla, "il pittore della luce" (fonte: esmadrid.com). Giardini andalusi magnifici nella sua dimora. Impressionismo luminoso e mediterraneo.',
      orario:'Mar–Sab 9:30–20, Dom 10–15',prezzo:'€3',tempo:'1 ora',lat:40.4342,lng:-3.6978},
    {id:'m6',name:'Museo del Romanticismo',emoji:'💌',cat:'Museo',
      desc:'Dimora nobiliare dell\'Ottocento con arredi, dipinti e oggetti dell\'epoca romantica completamente intatti. Come entrare in un quadro di Goya. Poco conosciuto, molto bello.',
      orario:'Mar–Sab 9:30–20:30, Dom 10–15',prezzo:'€3',tempo:'1 ora',lat:40.4262,lng:-3.7010},
    {id:'m7',name:'Museo Naval',emoji:'⚓',cat:'Museo',
      desc:'Storia navale spagnola dal Medioevo ad oggi. Qui si conserva la prima mappa conosciuta dell\'America (Juan de la Cosa, 1500). Gratuito e spesso trascurato dai turisti.',
      orario:'Mar–Dom 10–19',prezzo:'Gratuito',tempo:'1 ora',lat:40.4184,lng:-3.6940},
    {id:'m8',name:'Museo Lázaro Galdiano',emoji:'💎',cat:'Museo',
      desc:'Una delle collezioni private più eccentriche d\'Europa: avori medievali, gioielli, armi, smalti, orologi e dipinti di Goya, El Greco e Constable in una villa liberty.',
      orario:'Mar–Dom 10–15',prezzo:'€7',tempo:'1.5 ore',lat:40.4363,lng:-3.6856},
    {id:'m9',name:'Real Academia de Bellas Artes',emoji:'🎭',cat:'Museo',
      desc:'Terza pinacoteca di Madrid dopo Prado e Thyssen. Rubens, Velázquez, Zurbarán, Goya (autoritratti). In un palazzo barocco sulla Calle Alcalá dal 1752.',
      orario:'Mar–Dom 10–15',prezzo:'€8',tempo:'1 ora',lat:40.4176,lng:-3.6995},
    {id:'m10',name:'Museo Ferroviario (Delicias)',emoji:'🚂',cat:'Museo',
      desc:'Prima stazione monumentale di Madrid (1880), oggi museo con locomotive storiche, la storia delle ferrovie spagnole e il famoso treno Al-Andalus. Vicino a Madrid Río.',
      orario:'Mar–Dom 10–15',prezzo:'€6',tempo:'1.5 ore',lat:40.3980,lng:-3.6938},
    {id:'m11',name:'CaixaForum Madrid',emoji:'🏭',cat:'Museo',
      desc:'Centro culturale straordinario in un ex centrale elettrica del 1900, con il celebre giardino verticale di Patrick Blanc. Mostre temporanee di altissimo livello. Accesso gratuito alla plaza.',
      orario:'Lun–Dom 10–20',prezzo:'€6 mostre',tempo:'1.5 ore',lat:40.4091,lng:-3.6928},
    {id:'m12',name:'Museo Reale di Geologia',emoji:'🦕',cat:'Museo',
      desc:'Oltre all\'importante patrimonio geologico e paleontologico, il museo si trova in un edificio del 1927. Dinosauri, minerali rari e fossili. Ottimo per famiglie.',
      orario:'Mar–Ven 10–17, Sab–Dom 10–20',prezzo:'€3',tempo:'1.5 ore',lat:40.4392,lng:-3.6963},

    // ── MONUMENTI ───────────────────────────────────────────
    {id:'p1',name:'Palazzo Reale',emoji:'👑',cat:'Monumento',
      desc:'Il più grande palazzo reale dell\'Europa occidentale: 135.000 mq, 3.418 stanze, quasi il doppio di Buckingham Palace (fonte: visitmadrid.es). Cambio della guardia mer e sab. Audioguida consigliata.',
      orario:'Lun–Dom 10–20 (inverno 10–18)',prezzo:'€14 (gratis lun–sab 17–18)',tempo:'1–2 ore',lat:40.4179,lng:-3.7144},
    {id:'p2',name:'Puerta de Alcalá',emoji:'🏛️',cat:'Monumento',

// ═══════════════════════════════════════════════════════════
//  STATO
// ═══════════════════════════════════════════════════════════
let activeCity = 'madrid';
let activeCat = {madrid:'Tutti', toledo:'Tutti'};
let userPos = null;
let map = null;
let mapCity = null;
let userMarker = null;
let atkMarkers = [];

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  ['madrid','toledo'].forEach(c => { buildFilters(c); renderGrid(c); });
});

function switchCity(city) {
  activeCity = city;
  document.querySelectorAll('.city-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.city-tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
  document.getElementById('section-'+city).classList.add('active');
  const tab = document.getElementById('tab-'+city);
  tab.classList.add('active'); tab.setAttribute('aria-selected','true');
}

function buildFilters(city) {
  const cats = ['Tutti', ...new Set(DATA[city].map(a => a.cat))];
  const el = document.getElementById('filters-'+city);
  el.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (c==='Tutti' ? ' active' : '');
    b.textContent = c;
    b.onclick = () => {
      activeCat[city] = c;
      el.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderGrid(city);
    };
    el.appendChild(b);
  });
}

function clearSearch(city) {
  const inp = document.getElementById('search-'+city);
  inp.value = '';
  inp.focus();
  renderGrid(city);
}

function renderGrid(city) {
  const q = (document.getElementById('search-'+city)?.value||'').toLowerCase().trim();
  const cat = activeCat[city]||'Tutti';
  let items = DATA[city];
  if (cat !== 'Tutti') items = items.filter(a => a.cat===cat);
  if (q) items = items.filter(a =>
    a.name.toLowerCase().includes(q) ||
    a.desc.toLowerCase().includes(q) ||
    a.cat.toLowerCase().includes(q)
  );
  if (userPos) {
    items = items.map(a => ({...a, dist: hvs(userPos.lat, userPos.lng, a.lat, a.lng)}));
    items.sort((a,b) => a.dist - b.dist);
  }
  const grid = document.getElementById('grid-'+city);
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = '<div class="nores"><span class="nores-icon">🔍</span><p>Nessun risultato trovato.</p></div>';
  } else {
    items.forEach(a => grid.appendChild(mkCard(a)));
  }
  const badge = document.getElementById('count-'+city);
  if (badge) badge.textContent = items.length;
}

function mkCard(a) {
  const el = document.createElement('article');
  el.className = 'card';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${a.lat},${a.lng}&travelmode=walking`;
  const infoUrl = `https://www.google.com/search?q=${encodeURIComponent(a.name+' '+a.cat+' Spagna')}`;
  const db = a.dist !== undefined
    ? `<div class="badge"><span>🚶</span> ${fdist(a.dist)} · ≈${fmin(a.dist)} min</div>` : '';
  el.innerHTML = `
    <div class="card-head">
      <span class="cemoji" aria-hidden="true">${a.emoji}</span>
      <div class="cinfo">
        <h3 class="cname">${esc(a.name)}</h3>
        <span class="ccat">${esc(a.cat)}</span>
        <p class="cdesc">${esc(a.desc)}</p>
      </div>
    </div>
    <div class="card-meta">
      <div class="badge"><span>🕐</span> ${esc(a.orario)}</div>
      <div class="badge"><span>💶</span> ${esc(a.prezzo)}</div>
      ${a.tempo && a.tempo!=='–' ? `<div class="badge"><span>⏱</span> ${esc(a.tempo)}</div>` : ''}
      ${db}
    </div>
    <div class="card-act">
      <button class="btn-map" onclick="openMapOnPlace('${a.id}')">📍 Vedi su Mappa</button>
      <a class="btn-info" href="${infoUrl}" target="_blank" rel="noopener noreferrer">ℹ️ Info</a>
      <a class="btn-nav" href="${navUrl}" target="_blank" rel="noopener noreferrer">🧭 Portami Lì — Navigazione a Piedi</a>
    </div>`;
  return el;
}

// ═══════════════════════════════════════════════════════════
//  MAPPA — usa visibility trick: Leaflet mantiene il container
// ═══════════════════════════════════════════════════════════
function openMap(city) {
  document.getElementById('map-title').textContent = city==='madrid' ? '🏙️ Mappa Madrid' : '⚔️ Mappa Toledo';
  document.getElementById('map-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  setMapStatus('📡 Caricamento mappa…');

  // Attende che il browser abbia applicato visibility:visible e calcolato le dimensioni
  setTimeout(() => {
    if (!map || mapCity !== city) {
      if (map) { map.remove(); map=null; atkMarkers=[]; userMarker=null; }
      const center = city==='madrid' ? [40.4168,-3.7038] : [39.8581,-4.0244];
      const zoom   = city==='madrid' ? 14 : 15;
      map = L.map('map-container',{zoomControl:true}).setView(center, zoom);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:19
      }).addTo(map);
      mapCity = city;
    }
    // Doppio invalidateSize: primo immediato, secondo dopo rendering completo
    map.invalidateSize({animate:false});
    setTimeout(() => map && map.invalidateSize({animate:false}), 200);

    // Marker attrazioni
    atkMarkers.forEach(m => map.removeLayer(m));
    atkMarkers = [];
    DATA[city].forEach(a => {
      const ico = L.divIcon({
        html:`<div style="font-size:1.8rem;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))">${a.emoji}</div>`,
        className:'',iconSize:[30,30],iconAnchor:[15,15]
      });
      const m = L.marker([a.lat,a.lng],{icon:ico});
      m._aid = a.id;
      m.bindPopup(()=>mkPopup(a),{maxWidth:220,minWidth:160});
      m.addTo(map);
      atkMarkers.push(m);
    });

    // Geolocalizzazione
    setMapStatus('📡 Rilevamento posizione GPS…');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          userPos = {lat:pos.coords.latitude, lng:pos.coords.longitude};
          if (userMarker) { userMarker.remove(); userMarker=null; }
          const ico = L.divIcon({
            html:`<div style="width:20px;height:20px;background:#2563eb;border:4px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(37,99,235,.3),0 2px 8px rgba(0,0,0,.3)"></div>`,
            className:'',iconSize:[20,20],iconAnchor:[10,10]
          });
          userMarker = L.marker([userPos.lat,userPos.lng],{icon:ico,zIndexOffset:1000});
          userMarker.bindPopup('<b style="font-size:1.4rem">📍 Sei qui</b>');
          userMarker.addTo(map);
          map.setView([userPos.lat,userPos.lng],16);
          DATA[city].forEach(a => a.dist=hvs(userPos.lat,userPos.lng,a.lat,a.lng));
          renderGrid(city);
          setMapStatus('✅ La tua posizione è il punto blu — tocca i segnaposti per distanza e navigazione');
        },
        () => {
          setMapStatus('⚠️ GPS non disponibile — attiva la posizione per vedere le distanze a piedi');
        },
        {timeout:12000,enableHighAccuracy:true}
      );
    } else {
      setMapStatus('⚠️ GPS non supportato — mappa mostrata senza posizione');
    }
  }, 300);
}

function mkPopup(a) {
  const nav = `https://www.google.com/maps/dir/?api=1&destination=${a.lat},${a.lng}&travelmode=walking`;
  const d = userPos ? hvs(userPos.lat,userPos.lng,a.lat,a.lng) : null;
  const dh = d!==null ? `<div class="pdist">🚶 ${fdist(d)} · ≈${fmin(d)} min a piedi</div>` : '';
  return `<div><div class="pname">${esc(a.name)}</div><div class="pcat">${esc(a.cat)}</div><div class="pprice">💶 ${esc(a.prezzo)}</div>${dh}<a class="pgo" href="${nav}" target="_blank" rel="noopener noreferrer">🧭 Portami Lì</a></div>`;
}

function openMapOnPlace(id) {
  const city = DATA.madrid.find(a=>a.id===id) ? 'madrid' : 'toledo';
  openMap(city);
  setTimeout(() => {
    if (!map) return;
    map.invalidateSize({animate:false});
    const a = DATA[city].find(x=>x.id===id);
    if (!a) return;
    map.setView([a.lat,a.lng],17);
    const mk = atkMarkers.find(m=>m._aid===id);
    if (mk) mk.openPopup();
  }, 800);
}

function closeMap() {
  document.getElementById('map-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function setMapStatus(t) {
  const e = document.getElementById('map-status');
  if(e) e.textContent = t;
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
function hvs(a1,n1,a2,n2){
  const R=6371000,dA=(a2-a1)*Math.PI/180,dN=(n2-n1)*Math.PI/180;
  const a=Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fdist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km'}
function fmin(m){return Math.ceil(m/80)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMap()});
</script>
